<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gen X Dashboard</title>

<style>
:root {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #ffffff;
    --primary: #3b82f6;
}

.light-theme {
    --bg: #f1f5f9;
    --card: #ffffff;
    --text: #111827;
    --primary: #2563eb;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: 0.3s;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 25px;
    background: var(--card);
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    position: fixed;
    width: 100%;
    top: 0;
    z-index: 1000;
}

.logo {
    font-size: 20px;
    font-weight: bold;
    color: var(--primary);
}

.menu-btn {
    font-size: 22px;
    cursor: pointer;
}

.menu {
    position: fixed;
    top: 0;
    right: -260px;
    width: 250px;
    height: 100%;
    background: var(--card);
    padding-top: 60px;
    transition: 0.3s;
    box-shadow: -5px 0 15px rgba(0,0,0,0.4);
}

.menu a {
    display: block;
    padding: 15px 25px;
    text-decoration: none;
    color: var(--text);
    transition: 0.2s;
}

.menu a:hover {
    background: var(--primary);
}

.menu.active {
    right: 0;
}

/* Content */
.container {
    margin-top: 100px;
    padding: 40px;
    text-align: center;
}

.section-buttons {
    margin: 30px 0;
}

.section-buttons button {
    padding: 15px 30px;
    margin: 10px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    background: var(--primary);
    color: white;
    transition: 0.3s;
}

.section-buttons button:hover {
    transform: scale(1.05);
}

/* Cards */
.dashboard {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-top: 30px;
}

.card {
    background: var(--card);
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* About */
.about {
    margin-top: 50px;
    font-size: 18px;
    opacity: 0.9;
}

/* Toggle Switch */
.toggle-container {
    padding: 15px 25px;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">Gen X</div>
    <div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<div class="menu" id="menu">
    <a href="#">Home</a>
    <a href="#about">About</a>
    <a href="#">Login</a>
    <a href="#">Signup</a>
    <a href="#">Settings</a>

    <div class="toggle-container">
        <button onclick="toggleTheme()" style="padding:8px 15px;border:none;border-radius:6px;background:var(--primary);color:white;cursor:pointer;">
            Toggle Light/Dark
        </button>
    </div>
</div>

<div class="container">
    <h1>SaaS Dashboard</h1>

    <div class="section-buttons">
        <button>Men's Section</button>
        <button>Women's Section</button>
    </div>

    <div class="dashboard">
        <div class="card">
            <h3>Revenue</h3>
            <p>₹1,25,000</p>
        </div>
        <div class="card">
            <h3>Users</h3>
            <p>2,450 Active</p>
        </div>
        <div class="card">
            <h3>Orders</h3>
            <p>320 This Month</p>
        </div>
    </div>

    <div class="about" id="about">
        <h2>About</h2>
        <p><strong>Gen X</strong></p>
        <p>powered by github</p>
    </div>
</div>

<script>
function toggleMenu() {
    document.getElementById("menu").classList.toggle("active");
}

function toggleTheme() {
    document.body.classList.toggle("light-theme");
}
</script>

</body>
</html>
