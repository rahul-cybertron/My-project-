<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Dashboard - Home</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background-color: #121212;
    color: #fff;
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: #1e1e1e;
    height: 100vh;
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 30px;
    text-align: center;
    color: #00bcd4;
}

.sidebar ul {
    list-style: none;
}

.sidebar ul li {
    padding: 12px;
    margin: 10px 0;
    cursor: pointer;
    border-radius: 6px;
    transition: 0.3s;
}

.sidebar ul li:hover {
    background: #333;
}

/* Main Content */
.main {
    flex: 1;
    padding: 20px;
}

/* Topbar */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.topbar h1 {
    font-size: 22px;
}

.topbar button {
    padding: 8px 15px;
    background: #00bcd4;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    color: #000;
    font-weight: bold;
}

.topbar button:hover {
    background: #0097a7;
}

/* Products */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
}

.card {
    background: #1e1e1e;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
    background: #252525;
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 8px;
}

.card h3 {
    margin: 10px 0;
}

.price {
    color: #00e676;
    font-size: 18px;
    font-weight: bold;
}

.buy-btn {
    margin-top: 10px;
    padding: 8px 12px;
    border: none;
    background: #00bcd4;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

.buy-btn:hover {
    background: #0097a7;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>My Store</h2>
    <ul>
        <li>🏠 Dashboard</li>
        <li>📦 Products</li>
        <li>📊 Orders</li>
        <li>⚙ Settings</li>
        <li>🔒 Login</li>
    </ul>
</div>

<div class="main">

    <div class="topbar">
        <h1>Product Dashboard</h1>
        <button>Login</button>
    </div>

    <div class="products">

        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="Product">
            <h3>Product One</h3>
            <div class="price">₹999</div>
            <button class="buy-btn">Buy Now</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="Product">
            <h3>Product Two</h3>
            <div class="price">₹1499</div>
            <button class="buy-btn">Buy Now</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="Product">
            <h3>Product Three</h3>
            <div class="price">₹799</div>
            <button class="buy-btn">Buy Now</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300x200" alt="Product">
            <h3>Product Four</h3>
            <div class="price">₹1999</div>
            <button class="buy-btn">Buy Now</button>
        </div>

    </div>

</div>

</body>
</html>
